openapi: 3.0.3
info:
  title: Jsonplaceholder Todo Api
  description: A proxy for the JSONPlaceholder todos service to test Apigee capabilities.
  version: 1.0.20
servers:
- url: https://130.211.6.177.nip.io/jsonplaceholder-todo-api
  description: Apigee Proxy Gateway
security:
- ApiKeyAuth: []
tags:
- name: todos
  description: Todos operations
paths:
  /todos:
    get:
      tags:
      - todos
      summary: List all todos
      operationId: getTodos
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
    post:
      tags:
      - todos
      summary: Create a new todo
      operationId: postTodos
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  /todos/{id}:
    get:
      tags:
      - todos
      summary: Get a specific todo by ID
      operationId: getTodosById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      description: "JWT token authentication (Issuer: https://integrator-7535621.okta.com/oauth2/default)"
      name: ApiKey
      in: header
